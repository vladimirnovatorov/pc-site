fullScreen: true
blocks:

  # 2. Заголовок с каруселью
  - type: 'header-slider-block'
    randomOrder: false
    adaptive: false
    autoplay: 3000
    items:
      - title: '30-дневные облачные лицензии для физических лиц'
        width: 's'
        background:
          light:
            color: '#EFF2F8'
            fullWidth: true
          dark:
            color: '#262626'
            fullWidth: true
        buttons:
          - text: "Подробнее"
            theme: 'raised'
            url: '#'
      - title: 'Обновлены официальные версии программных продуктов линейки Топоматик Robur'
        width: 's'
        background:
          light:
            color: '#EFF2F8'
            fullWidth: true
          dark:
            color: '#262626'
            fullWidth: true
        buttons:
          - text: "Подробнее"
            theme: 'raised'
            url: '#'
      - title: 'Релиз Топоматик Robur — Генеральные планы 1.0'
        width: 's'
        background:
          light:
            color: '#EFF2F8'
            fullWidth: true
          dark:
            color: '#262626'
            fullWidth: true
        buttons:
          - text: "Подробнее"
            theme: 'raised'
            url: '#'

  # 3. Карточки продуктов
  - type: 'card-layout-block'
    title: 'Программные продукты'
    centered: false
    children:
      - type: 'basic-card'
        title: 'Топоматик Robur — Изыскания'
        text: 'Для обработки материалов инженерных изысканий и создания цифровой модели местности'
        gravityIcon:
          name: 'FaceSmile'
          color: 'text-color'
      - type: 'basic-card'
        title: 'Топоматик Robur — Автомобильные дороги'
        text: 'Для проектирования загородных дорог и городских улиц'
        gravityIcon:
          name: 'FaceSmile'
          color: 'text-color'
      - type: 'basic-card'
        title: 'Топоматик Robur — Железные дороги'
        text: 'Для проектирования новых и реконструирования существующих железных дорог и станций'
        gravityIcon:
          name: 'FaceSmile'
          color: 'text-color'
      - type: 'basic-card'
        title: 'Топоматик Robur — Искусственные сооружения'
        text: 'Для автоматизированного проектирования малых искусственных сооружений'
        gravityIcon:
          name: 'FaceSmile'
          color: 'text-color'
  
