  # 3. Карточки с информацией о компании
  - type: 'card-layout-block'
    animated: true
    colSizes:
        all: 12
        sm: 12
        md: 12
        lg: 3
        xl: 3
    children:
      - type: 'basic-card'
        border: 'none'
        controlPosition: 'content'
        size: 'l'
        title: 'НПФ «Топоматик»'
        text: '— российская ИТ-компания, специализирующаяся на разработке и сопровождении программного обеспечения для транспортного проектирования и строительства.'
      - type: 'basic-card'
        border: 'none'
        controlPosition: 'content'
        size: 'l'
        title: 'Программный комплекс'
        links:
          - url: '#'
            text: 'Подробнее'
            theme: 'normal'
            arrow: true
      - type: 'image-card'
        text: ''
        # url: '#'
        direction: 'reverse'
        margins: 'm'
        paddingBottom: 'm'
        border: 'none'
        controlPosition: 'content'
        size: 'l'
        image:
