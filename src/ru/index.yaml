        url: 'test'
      - type: 'image-card'
        title: 'Топоматик Robur — Искусственные сооружения'
        text: 'Для автоматизированного проектирования малых искусственных сооружений'
        image:
          dark: https://topomatic.ru/wp-content/uploads/2020/10/bn_isk_soor_01.jpg
          light: https://topomatic.ru/wp-content/uploads/2020/10/bn_isk_soor_01.jpg
        direction: 'direct'
