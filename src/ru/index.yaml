  # 3. Карточки продуктов
  - type: 'card-layout-block'
    title: 'Программные продукты'
    centered: false
    animated: true
    colSizes:
        all: 6
        sm: 6
        md: 5
        lg: 4
        xl: 2
    children:
      - type: 'image-card'
        title: 'Топоматик Robur — Изыскания'
        text: 'Для обработки материалов инженерных изысканий и создания цифровой модели местности'
        image:
          dark: https://topomatic.ru/wp-content/uploads/2020/10/bn_iziskania_01.jpg
          light: https://topomatic.ru/wp-content/uploads/2020/10/bn_iziskania_01.jpg
        direction: 'direct'
        border: 'shadow'
        margins: 's'
        url: 'test'
      - type: 'image-card'
        title: 'Топоматик Robur — Автомобильные дороги'
        text: 'Для проектирования загородных дорог и городских улиц'
        image:
          dark: https://topomatic.ru/wp-content/uploads/2020/10/bn_avtodor_01.jpg
          light: https://topomatic.ru/wp-content/uploads/2020/10/bn_avtodor_01.jpg
        direction: 'direct'
        border: 'shadow'
        margins: 's'
        url: 'test'
      - type: 'image-card'
        title: 'Топоматик Robur — Железные дороги'
        text: 'Для проектирования новых и реконструирования существующих железных дорог и станций'
        image:
          dark: https://topomatic.ru/wp-content/uploads/2020/10/bn_jelezn_doroga_01.jpg
          light: https://topomatic.ru/wp-content/uploads/2020/10/bn_jelezn_doroga_01.jpg
