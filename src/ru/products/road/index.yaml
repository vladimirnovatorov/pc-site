    title: 'Информационное моделирование'
    description: |
      Реализованы основные принципы технологии информационного моделирования. Это позволяет создать сводную информационную модель всего проектируемого объекта.
      Сводная информационная модель генерируется из совокупности исходных моделей, которые отображаются в рабочих окнах Robur и динамически перестраиваются при редактировании.
      Каждый элемент проекта имеет идентификатор дополнительной информации: выбрав какую-либо часть сводной модели, можно получить привязанный к ней список чертежей и ведомостей. 
