    description: |
      В **Топоматик Robur** – Автомобильные  дороги предусмотрено два основных механизма трассирования:
      - по тангенсам с заданием параметров закруглений
      - по элементам, последовательно добавляемым друг к другу, в том числе с помощью набора лекал

      Имеется возможность автоматического получения первого приближения проектной линии профиля по заданному критерию

