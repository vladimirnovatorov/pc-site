      - tabName: 'Функционал'
        border: 'line'
        text: |
          | Блок задач | Описание и функциональные возможности |
          | :--- | :--- |
          | **Базовый функционал** | Ленточный интерфейс; Динамическая информационная модель; Адаптивная структура проекта; Коллективная работа; Связанные документы. |
          | **Подготовка исходных данных** | В программу полностью включен функционал модуля «Топоматик Robur — Изыскания»: Геодезия, Геология, Цифровая модель местности и пр. |
          | **Трассирование** | Два механизма трассирования: по тангенсам и по элементам; Контроль целостности плана трассы; Импорт/экспорт трассы; Работа с многорадиусными кривыми; Задание пикетажа; Создание продольного профиля и поперечников по ЦММ; Режим «Динамическое трассирование». |
          | **Продольный профиль** | Получение первого приближения проектной линии; Редактирование по тангенсам и по элементам; Динамическая проверка отклонений от норм; Вертикальная планировка; Расчет видимости; Поддержка сплайнов. |
          | **Поперечные профили** | Проектирование многополосных дорог; Создание произвольного поперечника (газоны, тротуары, бордюры, разделительные полосы); Библиотека типовых конструкций. |
          | **Ремонт и реконструкция** | **Выравнивание покрытия:** картограмма выравнивания, оптимизация объемов, учет существующей конструкции.<br>**Уширение:** реконструкция с разделительной полосой, схемы «подрубка» и «досыпка», графическое редактирование поперечников. |
          | **Пересечения и примыкания** | Все известные типовые схемы; Горизонтальная и вертикальная планировка; Контроль в 3D. |
          | **Многоуровневые развязки** | Полный функционал: плановые построения, профиль по съезду, увязка съезда, построение объемной модели, контроль в 3D. |
          | **Обустройство и СТО** | **Автобусные остановки:** типовые схемы.<br>**Обустройство:** разметка, ограждения, знаки (в т. ч. индивидуальные). |
          | **Визуализация и оценка** | **Визуализация:** создание 3D-сцен, библиотека объектов, визуализация транспортного потока.<br>**Оценка:** графики скоростей, аварийности, безопасности, пропускной способности; видимость в плане, профиле и 3D. |
          | **Генплан и Землеотвод** | **Генплан:** моделирование и анализ поверхностей, картограммы работ, послойный подсчет площадей и объемов.<br>**Землеотвод:** проектный временный и существующий; ведомости земель. |
          | **Распределение земляных масс** | Исходные данные: объемы насыпей/выемок и геология. Учет характеристик грунтов, машин и приоритетов. В основе — решение транспортной задачи. |
          | **Исполнительная съемка** | Контроль ровности покрытия; Эпюра отклонений амплитуд. |
          | **Выходные документы** | **Чертежи:** план трассы, продольный и поперечные профили, топоплан, сечения по коммуникациям, геологические колонки, картограмма видимости.<br>**Ведомости:** элементы плана и профиля, координаты, разбивка кривых, искусственные сооружения, площади и объемы, отвод земель, знаки, разметка, исполнительная съемка. |
