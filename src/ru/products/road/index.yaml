        border: 'line'
        title: 'Топоматик Robur – Автомобильные дороги'
        text: 'Предназначен для проектирования загородных дорог и городских улиц. Помимо общего функционала для работы с планом, профилем и поперечниками, содержит ряд специализированных модулей для решения частных инженерных задач. Программный продукт позволяет автоматизировать весь процесс: от обработки данных изысканий до выноса проекта в натуру и его инженерного сопровождения.'
        media:
          videoIframe: 'https://storage.topomatic.ru/gitlab/documentation_robur%2Froad_video_test.mp4'
