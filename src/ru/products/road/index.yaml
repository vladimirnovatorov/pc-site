    items:
      - tabName: 'Обзор'
        border: 'line'
        text: '**Топоматик Robur – Автомобильные дороги** предназначен для проектирования загородных дорог и городских улиц. Помимо общего функционала для работы с планом, профилем и поперечниками, содержит ряд специализированных модулей для решения частных инженерных задач. Программный продукт позволяет автоматизировать весь процесс: от обработки данных изысканий до выноса проекта в натуру и его инженерного сопровождения.'
