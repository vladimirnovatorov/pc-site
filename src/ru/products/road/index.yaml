    description: |
      **Топоматик Robur – Автомобильные дороги** позволяет наносить на проектное решение основные элементы организации дорожного движения:
      - дорожную разметку
      - знаки
      - ограждения различного типа

      Для создания индивидуальных знаков предусмотрен встроенный графический редактор.
    media:
