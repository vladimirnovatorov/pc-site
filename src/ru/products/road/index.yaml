    description: |
      **Топоматик Robur – Автомобильные** дороги содержит блок функций для проектирования многоуровневых развязок.
      В процессе проектирования компонуются укрупненные элементы съездов, такие как переходно-скоростные и разделительные полосы, островки и разрывы.

