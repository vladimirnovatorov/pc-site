    title: 'Реконструкция'
    description: |
      Реализован блок функций позволяющий осуществлять устройство проектируемой дорожной одежды с учетом земляного полотна существующей дороги и ее конструктивных слоев.
      Предусмотрено четыре основных способа использования существующей конструкции дороги:
      - уширение
      - досыпка
      - досыпка одним слоем
      - ровик

      Способ реконструкции может определяться автоматически
