    description: |
      Блок задач по проектированию пересечений и примыканий в одном уровне позволяет выполнять горизонтальную и вертикальную планировку перекрестков и съездов в соответствии с определенными типовыми схемами.
      При создании вертикальной планировки автоматически увязываются профили по кромкам закруглений.
      Для редактирования разворотной петли или автобусной остановки достаточно выделить необходимый элемент на плане и изменить его характеристики в окне свойств выбранного объекта.
