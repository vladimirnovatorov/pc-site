    description: |
      Реализован специализированный функционал для решения задач связанных с ремонтом существующего покрытия.
      Предусмотрено автоматическое создание профиля выравнивания из условий не ослабления существующей конструкции или же минимизации объемов выравнивающего слоя, за счет предварительного фрезерования существующего покрытия 
