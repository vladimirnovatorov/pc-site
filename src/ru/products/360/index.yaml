  - type: 'tabs-block'
    centered: true
    contentSize: 'm'
    items:
      - tabName: 'Обзор'
        border: 'line'
        title: 'Топоматик 360'
        text: |
          <div style="text-align: justify">

          Предназначен для работы с информационными моделями объектов капитального строительства.

          Программа представляет собой бесплатный, удобный, гибкий инструмент для работы с IFC, SMDX и DWP файлами.

          Пользователям предоставляется право доступа к базовым функциональных возможностям «Топоматик 360» на безвозмездной основе.

          «Топоматик 360» работает под управлением ОС Windows и Linux.

          </div>
        buttons:
          - text: 'Скачать для Windows'
            theme: 'outlined'
            url: 'https://download.topomatic.ru/public/products/topomatic360/topomatic360-win-x64-latest.exe'
          - text: 'Скачать для Linux (deb, Astra Linux)'
            theme: 'outlined'
            url: 'https://download.topomatic.ru/public/products/topomatic360/topomatic360-linux-amd64-latest.deb'
          - text: 'Скачать для Linux (rpm, РЕД ОС)'
            theme: 'outlined'
            url: 'https://download.topomatic.ru/public/products/topomatic360/topomatic360-linux-x86_64-latest.rpm'
        media:
          videoIframe: 'URL ВИДЕО'
      - tabName: 'Функционал'
        border: 'line'
        text: |
          {% include [Функционал](./_includes/functionality.md) %}
      - tabName: 'Справка'
        border: 'line'
        text: |
          {% include [Справка](./_includes/help.md) %}

