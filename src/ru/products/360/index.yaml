        - text: 'Программная платформа Топоматик 360'
    title: 'Программная платформа Топоматик 360'
    description: |
      Платформа позволяет анализировать информационные модели в форматах SMDX и IFC. Удобная и быстрая, под Windows и Linux. Открытая для дальнейшей разработки.
    width: 's'
    buttons:
      - text: "Перейти на платформу"
        theme: 'action'
        img:
          url: 'https://download.topomatic.ru/public/media/docviewer/arrow_outward.svg'
          position: right
        url: 'https://360.topomatic.ru'
      - text: "Скачать настольную версию"
        theme: 'raised'
        img:
              url: 'https://download.topomatic.ru/public/media/docviewer/download_icon.svg'
              position: right
        url: 'https://vladimirnovatorov.github.io/pc-site/ru/products/360/#download' #надо разобраться как сделать относительную
    background:
      light:
        image:
          desktop: '../../_media/360_product_banner.png'
          mobile: '../../_media/360_product_banner.png'
        fullWidth: true
        fullWidthMedia: true
      dark:
        image:
          desktop: '../../_media/360_product_banner.png'
          mobile: '../../_media/360_product_banner.png'
        fullWidth: true
        fullWidthMedia: true

  - type: 'tabs-block'
    centered: true
    contentSize: 'm'
    items:
      - tabName: 'Обзор'
        border: 'none'
        title: 'Топоматик 360'
        text: |
          <div style="text-align: justify">

          Предназначен для работы с информационными моделями объектов капитального строительства.

          Программа представляет собой бесплатный, удобный, гибкий инструмент для работы с IFC, SMDX и DWP файлами.

          Пользователям предоставляется право доступа к базовым функциональных возможностям «Топоматик 360» на безвозмездной основе.

          «Топоматик 360» работает под управлением ОС Windows и Linux.

          </div>
        media:
          video:
            type: default
            src:
              - 'https://storage.topomatic.ru/gitlab/documentation_robur%2Finspection_rule.mp4'
            autoplay: true
            loop: true
            contain: true
            muted: true
            controls: 'custom'
            customControlsOptions:
              type: 'with-play-pause-button'
              muteButtonShown: true
              positioning: 'left'
      - tabName: 'Функционал'
        border: 'none'
        text: |
          {% include [Функционал](./_includes/functionality.md) %}
      - tabName: 'Справка'
        border: 'none'
        text: |
          {% include [Справка](./_includes/help.md) %}

