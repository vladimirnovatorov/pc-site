name: pc-site

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Рекомендуемая версия для свежих версий Gravity UI
          cache: 'npm'

      - name: Install dependencies
        run: npm install # npm ci более надежно для CI, чем npm install, но требует хранения package-lock.json в проекте (надо перейти на этот вариант)

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
